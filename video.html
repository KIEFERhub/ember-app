    { id: 'report', label: '리포트',

/* animate 헬퍼 */
function makeA(t) {
  return (s, e, f, to, ease = Easing.easeOutCubic) =>
    animate({ from: f, to, start: s, end: e, ease })(t);
}

/* ── Sparkle 아이콘 ─────────────────────────────────────── */
function SparkleIcon({ size = 16, color = EMBER }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round">

    </svg>
  );
}

/* ── Scene 1: 브랜드 인트로 (0–3.5s) ─────────────────────── */
function Scene1() {
  const t = useTime();
  const a = makeA(t);
  const glowO = a(0.2, 2.5, 0, 0.55);
  const logoO = a(0.4, 1.4, 0, 1);
  const logoS = a(0.4, 1.4, 0.82, 1);
  const wordO = a(0.9, 1.8, 0, 1);
  const tagO  = a(2.0, 3.0, 0, 1);
  const outO  = a(3.0, 3.5, 1, 0, Easing.easeInCubic);

  return (
    <div style={{ position: 'absolute', inset: 0, background: BG, opacity: outO, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 18 }}>

                  <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><rect x="2" y="2" width="20" height="20" rx="5" ry="5" fill="none" stroke="white" strokeWidth="2"/><circle cx="12" cy="12" r="4" fill="none" stroke="white" strokeWidth="2"/><circle cx="17.5" cy="6.5" r="1" fill="white"/></svg>

            <div style={{ position: 'relative', display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>

              </div>
              <span style={{ font: `500 13px/1 ${FONT}`, color: INK2, display: 'flex', alignItems: 'center', gap: 2, letterSpacing: '-0.02em' }}>
                상세보기
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={INK2} strokeWidth="2.2" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>

/* ── Scene 3: AI 리포트 (12.5–19.5s) — 다크 테마 ─────────── */
// 4행 × 7일 — ReportScreen.jsx 와 동일한 데이터 구조
const HEAT_DATA = [
  [0, 1, 0, 0, 1, 0, 0],
  [2, 4, 3, 5, 4, 2, 1],
  [4, 5, 4, 6, 5, 3, 2],
  [3, 2, 4, 3, 3, 1, 5],
];
const WEEK_DAYS = ['월', '화', '수', '목', '금', '토', '일'];

function Scene3() {
  const t = useTime();
  const a = makeA(t);
  const sceneO   = a(12.6, 13.4, 0, 1);
  const outO     = a(19.0, 19.5, 1, 0, Easing.easeInCubic);
  const op       = sceneO * outO;
  const titleO   = a(13.2, 14.0, 0, 1);
  const insightO = a(17.0, 17.8, 0, 1);
  const insightY = a(17.0, 17.8, 24, 0);

  return (
    <div style={{ position: 'absolute', inset: 0, background: BG, opacity: op }}>
      <StatusBar light={false} />
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', paddingTop: 50 }}>
        <AppHeader light={false} />

        <div style={{ flex: 1, padding: '10px 20px', overflow: 'hidden' }}>
          {/* 타이틀 */}
          <div style={{ opacity: titleO }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 4 }}>
              <SparkleIcon size={24} color={EMBER} />
              <span style={{ font: `700 24px/30px ${FONT}`, color: FG1, letterSpacing: '-0.045em' }}>AI 리포트</span>
            </div>
            <p style={{ font: `400 15px/22px ${FONT}`, color: FG2, marginBottom: 16, letterSpacing: '-0.025em' }}>이번 주 당신의 불씨를 읽었어요.</p>
          </div>

          {/* 히어로 인사이트 카드 (크림 다크) */}
          <div style={{ background: CREAM_D, borderRadius: 20, padding: '16px 18px', marginBottom: 12, opacity: titleO }}>
            <div style={{ display: 'flex', gap: 12, alignItems: 'center', marginBottom: 12 }}>
              <FlameState score={72} size={44} showLabel={false} />
              <div>
                <div style={{ font: `600 11px/14px ${FONT}`, color: EMBER, letterSpacing: '0.04em', textTransform: 'uppercase', marginBottom: 3 }}>이번 달 · 성장기</div>
                <div style={{ font: `500 15px/22px ${FONT}`, color: FG1, letterSpacing: '-0.025em' }}>불씨가 점점 안정되고 있어요</div>
              </div>
            </div>
            <p style={{ font: `400 13px/1.55 ${FONT}`, color: FG2, letterSpacing: '-0.02em' }}>
              특히 <span style={{ color: FG1, fontWeight: 500 }}>오후 시간대</span>의 절제가 불씨를 '잔잔' 상태로 지켜주고 있어요.
            </p>
          </div>

          {/* 히트맵 — 4×7, 불꽃 스펙트럼 (앱과 동일) */}
          <div style={{ background: CARD2, borderRadius: 20, padding: '16px 14px', opacity: titleO }}>
            <div style={{ font: `500 15px/22px ${FONT}`, color: FG1, letterSpacing: '-0.025em', marginBottom: 12 }}>사용 히트맵</div>

            {/* 요일 헤더 */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 7, marginBottom: 7 }}>
              {WEEK_DAYS.map(d => (
                <div key={d} style={{ font: `500 10px/1 ${FONT}`, color: FG3, textAlign: 'center', letterSpacing: '-0.01em' }}>{d}</div>
              ))}
            </div>

            {/* 셀 그리드 */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
              {HEAT_DATA.map((row, ri) => (
                <div key={ri} style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 7 }}>
                  {row.map((v, ci) => {
                    const idx = ri * 7 + ci;
                    const cellO = animate({ from: 0, to: 1, start: 14.0 + idx * 0.035, end: 14.8 + idx * 0.035 })(t);
                    return (
                      <div key={ci} style={{ height: 30, borderRadius: 9, background: FLAME_SCALE[Math.min(v, FLAME_SCALE.length - 1)], opacity: cellO }} />

                  })}

              ))}
            </div>

            {/* 범례 */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginTop: 12, justifyContent: 'flex-end' }}>
              <span style={{ font: `400 10px/1 ${FONT}`, color: FG3 }}>적음</span>
              {[1,2,3,4,5,6].map(i => (
                <div key={i} style={{ width: 14, height: 14, borderRadius: 4, background: FLAME_SCALE[i] }} />
              ))}
              <span style={{ font: `400 10px/1 ${FONT}`, color: FG3 }}>많음</span>
            </div>
          </div>

          {/* 추가 인사이트 */}
          <div style={{ background: CREAM_D, borderRadius: 20, padding: '14px 16px', marginTop: 12, opacity: insightO, transform: `translateY(${insightY}px)` }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginBottom: 8 }}>
              <SparkleIcon size={13} color={EMBER} />
              <span style={{ font: `600 11px/14px ${FONT}`, color: EMBER, letterSpacing: '0.04em', textTransform: 'uppercase' }}>AI 인사이트</span>
            </div>
            <p style={{ font: `500 15px/1.55 ${FONT}`, color: FG1, letterSpacing: '-0.03em' }}>
              "주말 YouTube 시청이 평일 대비 2.3배 높아요."

            <p style={{ font: `400 13px/1.45 ${FONT}`, color: FG2, marginTop: 6, letterSpacing: '-0.02em' }}>

            </p>
          </div>
        </div>

        <TabBar active="report" />
      </div>

}

/* ── Scene 4: 리그 (19.5–26s) — 다크 테마 ───────────────── */
const TIER_NAMES = { beacon: '봉화', bonfire: '화톳불', camp: '모닥불', spark: '불씨', coal: '잉걸' };
const TIER_COLORS = { beacon: '#F4C76B', bonfire: '#F0A23E', camp: '#E86F35', spark: '#C7502A', coal: '#8A3A1F' };
const BOARD = [
  { rank: 1, name: '김지민', tag: '프로 갓생러',       pts: 32, tier: 'beacon',  grad: ['#5E8FBF','#2A4E7A'] },
  { rank: 2, name: '정해린', tag: '미라클 모닝러',     pts: 30, tier: 'beacon',  grad: ['#BF7E5E','#7A3E2A'] },
  { rank: 3, name: '박도윤', tag: '조금만 더 힘내요!', pts: 28, tier: 'bonfire', grad: ['#5EBF8F','#2A7A52'], me: true },
  { rank: 4, name: '최서연', tag: '꾸준함의 대명사',   pts: 25, tier: 'bonfire', grad: ['#9E5EBF','#5C2A7A'] },
  { rank: 5, name: '이준호', tag: '주말 집중러',       pts: 21, tier: 'camp',    grad: ['#BF9E5E','#7A5C2A'] },
];
const RANK_COLS = ['#F4C76B', '#B8C4CC', '#E8703A'];

function Scene4() {
  const t = useTime();
  const a = makeA(t);
  const sceneO = a(19.6, 20.4, 0, 1);
  const outO   = a(25.2, 25.8, 1, 0, Easing.easeInCubic);
  const op     = sceneO * outO;
  const titleO = a(20.3, 21.0, 0, 1);

  return (
    <div style={{ position: 'absolute', inset: 0, background: BG, opacity: op }}>
      <StatusBar light={false} />
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', paddingTop: 50 }}>
        <AppHeader light={false} />

        <div style={{ flex: 1, padding: '12px 20px', overflow: 'hidden', opacity: titleO }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginBottom: 4 }}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={GREEN} strokeWidth="2" strokeLinecap="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>

          </div>
          <div style={{ font: `700 24px/30px ${FONT}`, color: FG1, letterSpacing: '-0.045em', marginBottom: 16 }}>커뮤니티 리그</div>

          {BOARD.map((m, i) => {
            const rowO = animate({ from: 0, to: 1, start: 20.8 + i * 0.15, end: 21.5 + i * 0.15 })(t);
            const rowX = animate({ from: 28, to: 0,  start: 20.8 + i * 0.15, end: 21.5 + i * 0.15 })(t);
            const tc = TIER_COLORS[m.tier];
            return (
              <div key={m.rank} style={{
                display: 'flex', alignItems: 'center', padding: '11px 14px',
                background: m.me ? 'rgba(232,112,58,0.08)' : 'rgba(255,255,255,0.03)',
                borderRadius: 16, marginBottom: 8,
                border: m.me ? `1.5px solid rgba(232,112,58,0.5)` : `1.5px solid ${CARD2}`,
                opacity: rowO, transform: `translateX(${rowX}px)`,
              }}>
                {/* 순위 */}
                <span style={{ font: `700 15px/1 ${FONT}`, color: RANK_COLS[i] || FG3, width: 22, flexShrink: 0, letterSpacing: '-0.02em' }}>{m.rank}</span>

                {/* 그라데이션 아바타 */}
                <div style={{
                  width: 38, height: 38, borderRadius: 9999, flexShrink: 0, marginRight: 11,
                  background: `linear-gradient(140deg, ${m.grad[0]}, ${m.grad[1]})`,
                  border: m.me ? `2px solid ${EMBER}` : '2px solid rgba(255,255,255,0.10)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  font: `700 16px/1 ${FONT}`, color: '#fff', letterSpacing: 0,
                }}>{m.name[0]}</div>

                {/* 이름 + 태그 */}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                    <span style={{ font: `600 15px/1 ${FONT}`, color: FG1, letterSpacing: '-0.03em' }}>{m.name}</span>

                  </div>
                  <div style={{ font: `400 12px/1 ${FONT}`, color: FG2, marginTop: 3, letterSpacing: '-0.01em' }}>{m.tag}</div>
                </div>

                {/* 티어 배지 + 점수 */}
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 4, flexShrink: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: 1 }}>
                    <span style={{ font: `800 22px/1 ${FONT}`, color: m.me ? EMBER : FG1, letterSpacing: '-0.04em' }}>{m.pts}</span>
                    <span style={{ font: `400 11px/1 ${FONT}`, color: FG2 }}>점</span>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 3, background: `${tc}18`, borderRadius: 6, padding: '2px 6px' }}>
                    {/* 작은 불꽃 아이콘 */}
                    <svg width="9" height="11" viewBox="0 0 12 16" fill={tc}><path d="M6 0C4 4 0 6 0 10a6 6 0 0012 0C12 6 8 4 6 0z"/></svg>
                    <span style={{ font: `600 10px/1 ${FONT}`, color: tc, letterSpacing: '-0.01em' }}>{TIER_NAMES[m.tier]}</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        <TabBar active="league" />
      </div>
    </div>
  );
}

/* ── Scene 5: 클로징 (26–30s) ───────────────────────────── */
function Scene5() {
  const t = useTime();
  const a = makeA(t);
  const sceneO = a(25.8, 26.8, 0, 1);
  const flameO = a(26.5, 27.5, 0, 1);
  const flameS = a(26.5, 27.5, 0.88, 1);
  const wordO  = a(27.4, 28.4, 0, 1);
  const glowP  = 0.32 + 0.10 * Math.sin(t * 2 * Math.PI * 0.65);

  return (
    <div style={{ position: 'absolute', inset: 0, background: BG, opacity: sceneO, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 28 }}>
      <div style={{ position: 'absolute', inset: 0, background: `radial-gradient(ellipse 300px 300px at 50% 45%, rgba(91,200,214,${glowP}), transparent)`, pointerEvents: 'none' }} />
      <div style={{ opacity: flameO, transform: `scale(${flameS})`, display: 'flex', justifyContent: 'center' }}>
        <FlameState score={92} size={220} showLabel={false} />
      </div>
      <div style={{ opacity: wordO, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <Logo size={34} color={EMBER} />
          <span style={{ font: `800 44px/1 ${FONT}`, color: FG1, letterSpacing: '-0.055em' }}>Ember</span>
        </div>
        <p style={{ font: `400 17px/1 ${FONT}`, color: FG2, letterSpacing: '-0.025em' }}>불씨처럼, 조금씩</p>
      </div>
    </div>
  );
}

/* ── 루트 ─────────────────────────────────────────────────── */
function Video() {
  return (
    <Stage width={390} height={844} duration={30} background={BG}>
      <Scene1 />
      <Scene2 />
      <Scene3 />
      <Scene4 />
      <Scene5 />
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Video />);
</script>
