<script type="text/babel">
const { useState, useEffect } = React;

// flame score — higher = more restraint = healthier flame ("잔잔/steady" by default)
const DEMO_SCORE = 72;

function App() {
  const [tab, setTab] = useState('home');
  const [overlay, setOverlay] = useState(null); // null | 'mypage' | 'notifications'
  const [focus, setFocus] = useState(false);
  const [focusPreset, setFocusPreset] = useState(null);
  const [theme, setTheme] = useState(() => localStorage.getItem('ember-theme') || 'light');

  useEffect(() => {
    localStorage.setItem('ember-theme', theme);
    document.body.className = theme === 'dark' ? 'bg-dark' : 'bg-light';
  }, [theme]);

  const dark = theme === 'dark';
  const toggleTheme = () => setTheme(t => (t === 'dark' ? 'light' : 'dark'));

  const openFocus = (preset = null) => { setFocusPreset(preset); setFocus(true); };
  const [usageSheet, setUsageSheet] = useState(null); // null | 'home' | 'week'

  // deterministic navigation helper (used by PPTX export); harmless at runtime
  useEffect(() => {
    window.__nav = (screen) => {
      setFocus(false); setUsageSheet(null);
      if (screen === 'mypage' || screen === 'notifications') { setOverlay(screen); }
      else { setOverlay(null); setTab(screen); }
    };
  }, []);

  const screens = {
    home:   <HomeScreen   onNavigate={(t) => (t === 'mood' ? setOverlay(t) : t === 'flames' ? setUsageSheet('flames') : setTab(t))} onOpenFocus={openFocus} onOpenUsage={() => setUsageSheet('home')} onOpenApps={() => setUsageSheet('apps')} onOpenFocusScore={() => setUsageSheet('focusScore')} score={DEMO_SCORE} />,
    report: <ReportScreen onNavigate={(t) => (t === 'mood' ? setOverlay(t) : setTab(t))} onOpenWeekUsage={() => setUsageSheet('week')} score={DEMO_SCORE} />,
    sleep:  <SleepScreen  />,
    league: <LeagueScreen />,
  };

  return (
    <IOSDevice dark={dark}>
      <div className={dark ? '' : 'theme-light'}
        style={{ height: '100%', boxSizing: 'border-box', display: 'flex', flexDirection: 'column', background: 'var(--bg)', paddingTop: 50, position: 'relative' }}>
        {overlay === 'mypage' ? (
          <MyPageScreen onBack={() => setOverlay(null)} theme={theme} onToggleTheme={toggleTheme} score={DEMO_SCORE} />
        ) : overlay === 'notifications' ? (
          <NotificationsScreen onBack={() => setOverlay(null)} />
        ) : overlay === 'mood' ? (
          <MoodScreen onBack={() => setOverlay(null)} />
        ) : overlay === 'flames' ? (
          <FlameGalleryScreen onBack={() => setOverlay(null)} score={DEMO_SCORE} />
        ) : (
          <>
            <Header onProfile={() => setOverlay('mypage')} onBell={() => setOverlay('notifications')} />
            <div style={{ flex: 1, minHeight: 0, position: 'relative' }}>
              {screens[tab]}
              <FocusFab onClick={() => (focus ? setFocus(false) : openFocus(null))} />
            </div>
            <TabBar active={tab} onChange={setTab} />
          </>
        )}
        {focus && <FocusSheet onClose={() => setFocus(false)} preset={focusPreset} />}
        {usageSheet === 'home' && <UsageReportSheet onClose={() => setUsageSheet(null)} />}
        {usageSheet === 'apps' && <AppUsageSheet onClose={() => setUsageSheet(null)} />}
        {usageSheet === 'focusScore' && <FocusDetailSheet onClose={() => setUsageSheet(null)} />}
        {usageSheet === 'flames' && <FlameGalleryPopup onClose={() => setUsageSheet(null)} score={DEMO_SCORE} />}
        {usageSheet === 'week' && <UsageDetailSheet onClose={() => setUsageSheet(null)} />}
      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// fit the fixed 402×874 phone into whatever viewport we're shown in
function fitPhone() {
  const scaler = document.getElementById('scaler');
  const stage = document.getElementById('stage');
  if (!scaler) return;
  const PW = 402, PH = 874, pad = 24;
  const vw = window.innerWidth, vh = window.innerHeight;
  // bail while the iframe has no usable dimensions — avoids a negative/zero scale
  if (vw < PW * 0.1 || vh < PH * 0.1) return;
  const s = Math.max(0.05, Math.min((vw - pad) / PW, (vh - pad) / PH, 1));
  scaler.style.transform = `scale(${s})`;
  stage.style.width = vw + 'px';
  stage.style.height = vh + 'px';
}
window.addEventListener('resize', fitPhone);
window.addEventListener('load', fitPhone);
// self-heal: re-run whenever the document actually gains/changes size
if (window.ResizeObserver) {
  try { new ResizeObserver(fitPhone).observe(document.documentElement); } catch (e) {}
}
// and a few early ticks in case the first call sees a 0-size iframe
[0, 50, 150, 400].forEach(t => setTimeout(fitPhone, t));
requestAnimationFrame(() => requestAnimationFrame(fitPhone));
fitPhone();

</script>
<script>
(async () => {
  // Prepend so page-supplied @page / break rules (deck-stage's margin:0,
  // author CSS) keep source-order precedence over the baseline.
  const baseCss = document.createElement('style');
  baseCss.textContent = "@media print {\n  @page { margin: 0.5cm; }\n  html, body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }\n  section, article, figure, table { break-inside: avoid; }\n  *, *::before, *::after {\n    animation-delay: -99s !important; animation-duration: .001s !important;\n    animation-iteration-count: 1 !important; animation-fill-mode: both !important;\n    animation-play-state: running !important; transition-duration: 0s !important;\n  }\n}";
  document.head.prepend(baseCss);
  if (document.readyState === 'loading') {
    await new Promise((r) => document.addEventListener('DOMContentLoaded', r, { once: true }));
  }
  let ds = document.querySelector('deck-stage');
  // whenDefined never resolves when nothing registers the element, so only
  // await it when a <deck-stage> tag exists (and race a timeout regardless).
  if (ds && !customElements.get('deck-stage')) {
    try {
      await Promise.race([
        customElements.whenDefined('deck-stage'),
        new Promise((r) => setTimeout(r, 3000)),
      ]);
    } catch (e) {}
    ds = document.querySelector('deck-stage');
  }
  // dc-runtime assigns window.DCLogic at init and mounts into #dc-root on
  // DOMContentLoaded; settle on that subtree so React has rendered before
  // print(). Non-DC pages fall through to weighing body.
  const isDc = !ds && 'DCLogic' in window;
  const settleRoot = ds || (isDc ? document.getElementById('dc-root') : null) || document.body;
  if (settleRoot) {
    // Weigh only content children — skip script/style/template so inline
    // Babel/CSS doesn't register as stable "content" before the framework
    // has mounted anything.
    const MEDIA = 'img,svg,canvas,video,picture,iframe,embed,object';
    const weigh = () => {
      let text = 0, media = 0;
      for (const c of settleRoot.children) {
        const t = c.tagName;
        if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
        text += (c.textContent || '').trim().length;
        media += c.querySelectorAll(MEDIA).length + (c.matches(MEDIA) ? 1 : 0);
      }
      return text + media * 100;
    };
    // "Non-zero and stable" alone is not sufficient to mean rendered: generic
    // body can carry a static shell while async main content is pending, and
    // #dc-root can carry the root DC's static text while child refs are still
    // .sc-placeholder boxes. Gate generic on readyState 'complete', and never
    // accept stability while a dc-runtime placeholder is present.
    const isGeneric = settleRoot === document.body;
    const deadline = Date.now() + 15000;
    let last = -1, stable = 0;
    while (Date.now() < deadline) {
      const n = weigh();
      const ready =
        (!isGeneric || document.readyState === 'complete') &&
        !settleRoot.querySelector('.sc-placeholder');
      if (n > 0 && n === last && ready) { if (++stable >= 2) break; } else { stable = 0; }
      last = n;
      await new Promise((r) => setTimeout(r, 250));
    }
  }
  try { await document.fonts.ready; } catch (e) {}
  // Jump every animation to its end state so print() never captures a slide
  // mid-entrance. Ordering matters: the 0s-transition style must be live
  // BEFORE data-deck-active is set so attribute-keyed transitions don't
  // start a (now-0s) run from the pre-active base.
  const st = document.createElement('style');
  st.textContent = '*,*::before,*::after{animation-delay:-99s !important;animation-duration:.001s !important;animation-iteration-count:1 !important;animation-fill-mode:both !important;animation-play-state:running !important;transition-duration:0s !important}';
  document.head.appendChild(st);
  for (const d of document.querySelectorAll('deck-stage')) {
    for (const c of d.children) {
      const t = c.tagName;
      if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
      c.setAttribute('data-deck-active', '');
    }
  }
  try {
    const sweep = () => {
      for (const a of document.getAnimations()) {
        try { a.finish(); } catch (e) {
          try { a.currentTime = (a.effect && a.effect.getComputedTiming().duration) || 0; a.pause(); } catch (e2) {}
        }
      }
    };
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
  } catch (e) {}
  setTimeout(() => { try { window.print(); } catch (e) {} }, 200);
})();
</script>
