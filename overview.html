<body>
<div id="root"></div>

<script src="kakao_icon.js"></script>
<script src="photos.js"></script>
<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="FlameState.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="HomeHero.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="RoutineGallery.jsx"></script>
<script type="text/babel" src="FocusMode.jsx"></script>
<script type="text/babel" src="ReportScreen.jsx"></script>
<script type="text/babel" src="SleepScreen.jsx"></script>
<script type="text/babel" src="LeagueScreen.jsx"></script>
<script type="text/babel" src="MoodScreen.jsx"></script>
<script type="text/babel" src="FlameGalleryScreen.jsx"></script>
<script type="text/babel" src="MyPageScreen.jsx"></script>
<script type="text/babel" src="NotificationsScreen.jsx"></script>
<script type="text/babel" src="OnboardingFlow.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const SCORE = 72;
const AW = 390, AH = 844; // artboard = iOS inner content dimensions

/* ── Light-mode app wrapper ─────────────────────────────── */
function Frame({ dark = false, children }) {
  return (
    <IOSDevice dark={dark}>
      <div className={dark ? '' : 'theme-light'} style={{
        height: '100%', boxSizing: 'border-box',
        display: 'flex', flexDirection: 'column',
        background: 'var(--bg)', paddingTop: 50, position: 'relative',
      }}>
        {children}
      </div>
    </IOSDevice>
  );
}

/* ── Artboard helper (full-screen tab screen) ─────────────── */
function TabFrame({ tab, dark = false }) {
  return (
    <Frame dark={dark}>
      <Header />
      <div style={{ flex: 1, minHeight: 0, position: 'relative' }}>
        {tab === 'home'   && <HomeScreen onNavigate={() => {}} onOpenFocus={() => {}} onOpenUsage={() => {}} onOpenApps={() => {}} onOpenFocusScore={() => {}} score={SCORE} />}
        {tab === 'report' && <ReportScreen score={SCORE} onNavigate={() => {}} onOpenWeekUsage={() => {}} />}
        {tab === 'sleep'  && <SleepScreen />}
        {tab === 'league' && <LeagueScreen />}
      </div>
      <TabBar active={tab} onChange={() => {}} />
    </Frame>
  );
}

/* ── Overlay screens ──────────────────────────────────────── */
function OverlayFrame({ which, dark = false }) {
  return (
    <Frame dark={dark}>
      {which === 'mypage'        && <MyPageScreen onBack={() => {}} theme={dark ? 'dark' : 'light'} onToggleTheme={() => {}} score={SCORE} />}
      {which === 'notifications' && <NotificationsScreen onBack={() => {}} />}
      {which === 'mood'          && <MoodScreen onBack={() => {}} />}
      {which === 'flames'        && <FlameGalleryScreen onBack={() => {}} score={SCORE} />}
      {which === 'focus'         && (
        <>
          <Header />
          <div style={{ flex: 1, minHeight: 0, position: 'relative' }}>
            <HomeScreen onNavigate={() => {}} onOpenFocus={() => {}} onOpenUsage={() => {}} onOpenApps={() => {}} onOpenFocusScore={() => {}} score={SCORE} />
          </div>
          <TabBar active="home" onChange={() => {}} />
          <FocusSheet onClose={() => {}} preset={null} />
        </>
      )}
    </Frame>
  );
}

/* ── Main overview ────────────────────────────────────────── */
function Overview() {
  return (
    <DesignCanvas>
      <DCSection id="onboarding" title="온보딩">
        <DCArtboard id="ob-splash" label="스플래시 / 로그인" width={AW} height={AH}>
          <OnboardingApp />
        </DCArtboard>
      </DCSection>

      <DCSection id="tabs" title="메인 탭">
        <DCArtboard id="tab-home"   label="홈"     width={AW} height={AH}><TabFrame tab="home" /></DCArtboard>
        <DCArtboard id="tab-report" label="리포트"  width={AW} height={AH}><TabFrame tab="report" /></DCArtboard>
        <DCArtboard id="tab-sleep"  label="수면"   width={AW} height={AH}><TabFrame tab="sleep" /></DCArtboard>
        <DCArtboard id="tab-league" label="리그"   width={AW} height={AH}><TabFrame tab="league" /></DCArtboard>
      </DCSection>

      <DCSection id="sub" title="서브 화면">
        <DCArtboard id="ov-mypage" label="마이페이지"   width={AW} height={AH}><OverlayFrame which="mypage" /></DCArtboard>
        <DCArtboard id="ov-notif"  label="알림"        width={AW} height={AH}><OverlayFrame which="notifications" /></DCArtboard>
        <DCArtboard id="ov-mood"   label="기분 기록"    width={AW} height={AH}><OverlayFrame which="mood" /></DCArtboard>
        <DCArtboard id="ov-flames" label="불꽃 갤러리"  width={AW} height={AH}><OverlayFrame which="flames" /></DCArtboard>
        <DCArtboard id="ov-focus"  label="집중 모드"    width={AW} height={AH}><OverlayFrame which="focus" /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Overview />);
</script>
</body>
</html>
